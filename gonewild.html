function gravity(o) {
    let cd = 0;
    if(typeof o.grav === "boolean"){
       
        o.impulse = o.fs * o.mass;

        if(o.y >= (canvas.height / 2) - (o.sy / 2)) {
            cd ++;
            if(cd === 1) {
o.fs = 0;
o.y = (canvas.height / 2) - (o.sy  / 2);
            };
        } else {
             o.y += o.fs;
        };
    };
};

function cd(x,y) {
    let dx = x.orgX - y.x;
    let dz = x.orgZ - y.z;

    return Math.sqrt(dx * dx + dz * dz);
};



function draw_line(point, point1, object) {
    ctx.beginPath();

    ctx.lineTo(point1.x, point1.y);
    ctx.strokeStyle = object.c;
    ctx.stroke();
};



function allTransitions(o) {

 o.sx = (o.orgsx * oneUnit_equalsto) / o.d;
