function calcDist(a, b) {
    let dx = a.x - b.x;
    let dy = a.y - b.y;

function collide(what, what1, isPush) {
    if(what.z === what1.z) {
   let collide = what.x <= what1.x + what1.sx &&
        what.x + what.sx >= what1.x &&
        what.y <= what1.y + what1.sy &&
