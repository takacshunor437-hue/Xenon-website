<!DOCTYPE html>

    <script>

//FUNCTIONS


function cd(x,y) {
    let dx = x.orgX - y.x;
    let dz = x.orgZ - y.z;

    return Math.sqrt(dx * dx + dz * dz);
};



function draw_line(point, point1, object) {
    ctx.beginPath();
    ctx.moveTo(point.x, point.y);
    ctx.lineTo(point1.x, point1.y);
    ctx.strokeStyle = object.c;
    ctx.stroke();
};



function allTransitions(o) {
    let newX = (o.orgX - player.x); 
let newZ = (o.orgZ - player.z);
let direction = [o.orgX , o.orgZ ];
let player_direction = [0,0];
player_direction[0] = player.x + Math.cos(player.ry) * o.d;
player_direction[1] = player.z + Math.sin(player.ry) * o.d;
//THE PLAYER_DIR VARIABLE IS POINT A
//DIRECTION VARIABLE IS POINT B
let directionStart = [player.x , player.z];
let player_directionStart = directionStart;
//S = THETA * RADIUS...THETA = S / RADIUS...
let S = Math.sqrt((direction[0] - player_direction[0]) * (direction[0] - player_direction[0]) + (direction[1] - player_direction[1])  * (direction[1] - player_direction[1]));
let theta1 = S / o.d //THE ANGULAR DIFFERENCE IN RADIANS
let check = (o.orgX - player.x) * Math.sin(player.ry) - (o.orgZ - player.z) * Math.cos(player.ry);

let realTheta = theta1;
theta = theta1;

if (check > 0) {
    realTheta = -theta1;
};
//DOING ACTUALLY EVERYTHING
        o.sx = (o.orgsx * oneUnit_equalsto) / o.d;
    o.sy = (o.orgsy * oneUnit_equalsto) / o.d;

    let sx1 = (canvas.width / 2) - (realTheta * canvas.width);
    let sy1 = (canvas.height / 2) - (o.sy / 2);



o.x = sx1;
o.y = sy1;
o.z = newZ;
};

function allTransitions_rotated(o) {
for(let  i= 0; i < o.p.length; i++) {
    let p = o.p[i];
    let sy1 = (canvas.height / 2) - (p.y);
    let newZ = p.orgZ - player.z;
      if(i === 0) {
        o.x = p.x;
        o.y = p.y;
        o.z = p.z;
    };


let direction = [p.orgX , p.orgZ ];
let player_direction = [0,0];
player_direction[0] = player.x + Math.cos(player.ry) * p.d;
player_direction[1] = player.z + Math.sin(player.ry) * p.d;

let S = Math.sqrt((direction[0] - player_direction[0]) * (direction[0] - player_direction[0]) + (direction[1] - player_direction[1])  * (direction[1] - player_direction[1]));
let theta1 = S / p.d //THE ANGULAR DIFFERENCE IN RADIANS
let check = (p.orgX - player.x) * Math.sin(player.ry) - (p.orgZ - player.z) * Math.cos(player.ry);
let realTheta = theta1;
p.theta = theta1;
if (check > 0) {
    realTheta = -theta1;
};

 o.sx = (o.orgsx * oneUnit_equalsto) / o.d;
    o.sy = (o.orgsy * oneUnit_equalsto) / o.d;

       let sx1 = (canvas.width / 2) - (realTheta * canvas.width);
    

if(i === 0) {
    p.x = sx1;
    p.y = sy1;
};
      if(i === 1) {
        let d_x = p.orgX - player.x;
        let d_z = p.orgZ - player.z;
        let angle = Math.atan2(d_x,d_z);
        p.x = p.orgX +  Math.cos(o.ry - angle) * o.orgsx + sx1;
        p.z = newZ;
        p.y = sy1;
    };
};
};

//SAME FOR ROTATED

function playSound(path) {
    const sound = new Audio();
    sound.src = path;
    sound.play();
};

function lm(p) {
    const img = new Image();
    img.src = p;
    return img;
};

function newMonsta() {
    objects.push({
        orgX: -200 + Math.floor(Math.random() * 800), orgZ: -200 + Math.floor(Math.random() * 800), x: 0,
        y: 0, z: 0, orgsx: 50, 
        orgsy: 90,img: lm("./dandoe_soldier.png"), hp: 100,
        visible: true, attackCD: 0,onClick() {
            console.log("CLICKS REGIESTER ")
            if(player.bullets > 0) {
                if(this.hp > 0) {
                    this.hp -= 30;
                    playSound("./hurt.wav");
                } else {
                    playSound("./die.wav");
                    this.visible = false;
                    player.bullets += 2 + Math.floor(Math.random() * 3);
                    this.d = 1000000000000;
                    this.ff = function() {};
                };
            };
        },speed: player.speed, ff() {
            if(typeof this.d === "number" && this.d > 2) {
if(this.orgX < player.x) this.orgX += this.speed;
if(this.orgX > player.x) this.orgX -= this.speed;

if(this.orgZ < player.z) this.orgZ += this.speed;
if(this.orgZ > player.z) this.orgZ -= this.speed;
            } else {
                if(this.attackCD < 60) {
                    this.attackCD ++;
                } else {
                    if(player.hp > 0) {
                player.hp -= 20;
                player.bullets --;
                    } else {
                        window.location.reload();
                    };
                    this.attackCD = 0;
                };
            };
        }
    });
};

function trees() {
    for(let i = 0; i < 200; i ++) {
    objects.push({
        img: lm("./shitasstree.png"),
        x: 0,
        y: 0,
        z: 0,
        orgsx: 60,
        orgsy: 120,
        orgX: -500 + Math.floor(Math.random() * canvas.width * 2) - canvas.width * 0.76,
        orgZ:  -500 + Math.floor(Math.random() * canvas.width * 2) - canvas.width * 0.76,
        visible: true,
    });
};
};

//VARIABLES
let canvas = document.createElement("canvas");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
document.body.appendChild(canvas);

{

    c: "red", ry: 60, sx: 60,
    sy: 60, sz: 60, p: [
        {orgX: 50, orgY: 0, orgZ: 0, x: 50, y: 0, z: 0, theta: 0, d: 0}, //POINT 1, THE AXIS
        {orgX: 50, orgY: 0, orgZ: 0, x: 50, y: 0, z: 0, theta: 0, d: 0}, //POINT 2, POINT B
    ],
    visible: true
}
];

    translatedX: 0,
    ff() {
                    let strafeVectorx = Math.cos(this.ry + (Math.PI / 2)) * this.speed;

            this.z -= -this.directionVector[2] * this.speed * oneUnit_equalsto;

                      };

            this.x += -this.directionVector[0] * this.speed * oneUnit_equalsto;
            this.z += -this.directionVector[2] * this.speed * oneUnit_equalsto;
                for(let  i= 0; i <  objects.length; i++) {
                let o = objects[i];
                      
                      };
        };
        if(keys["a"] || keys['A']) {

            this.x -= -strafeVectorx;
            this.z -= -strafeVectorz;
        };
         if(keys["d"] || keys['D']) {

            this.x -= strafeVectorx;
            this.z -= strafeVectorz;
        };
    }, renderDistance: 500, 
    bullets: 25, hp: 100,
};

let objects = [

];
let keys = [];
let cpk = 0;
let cmbd = null;
let theta = 0;
let a = -1;
let b = 0;

//EVENT LISTENERS
window.addEventListener("keydown", e => {
    keys[e.key] = true;
    cpk = e.key;
    if(!document.pointerLockElement) {
        document.body.requestPointerLock();
    };

});
window.addEventListener("keyup", e => {
    keys[e.key] = false;
    cpk = 0;
});
window.addEventListener("mousemove", e => {
    //CONVERT DEGREES TO RADIANS
    let rotation = (Math.PI / 360 * player.sens) / 10;
   player.ry -= e.movementX * rotation;

player.directionVector[0] = Math.cos(player.ry) * player.speed;
player.directionVector[2] = Math.sin(player.ry) * player.speed;


});

window.addEventListener("mousedown", e => {
    cmbd = e.button;
if(player.bullets > 0) {
    player.bullets --;
    playSound("./shot.wav");
};
    for(let i = 0; i < objects.length;i++) {
        let o = objects[i];
if(typeof o.onClick === "function") {
    let x = (canvas.width - 2) / 2;
    let y = (canvas.height - 2) / 2;
        let check = x >= o.x &&
            x <= o.x + o.sx &&
        y >= o.y &&
            y <= o.y + o.sy;

            if(check) {
                o.onClick();
            };
};
    };
});

//CALL NECESSARY FUNCTIONS/INTERVALS    
 setInterval(newMonsta, 5500);
 trees();

//RENDER
function r() {
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle = "green";
ctx.fillRect(0, canvas.height/2, canvas.width, canvas.height);
for(let i = 0; i < objects.length + 1; i++) {
    let o = objects[i];

if(typeof o === "object") {
    o.d = cd(o,player);
    if(typeof o.ff === "function") {
        o.ff();
    };
    objects.sort(function(x,y) {
return y.d - x.d;
    });
   allTransitions(o);
if(theta < 0.6 && o.visible === true) {
        if(typeof o.img === "undefined") {
            ctx.fillStyle = o.c;
            ctx.fillRect(o.x, o.y,o.sx,o.sy);

        };
};
};
};
//ROTATED OBJECTS
for(let i = 0; i < objects_canRotate.length; i++) {

    a ++;
    if(typeof o === "object" && typeof o.p[a].theta === "number") {

        if(typeof o.ff === "function") {
            o.ff();
        };

            let p = o.p[i];

            let dz = p.orgZ - player.z;
            let a = Math.pow(dx, 2);
            let b = Math.pow(dz, 2);
            p.d = Math.sqrt(a + b);
        };
        allTransitions_rotated(o);
if(o.p[a].theta < 0.6 && o.visible === true) {

    };
};


if(a === 1) {

};
    };
};



//CALLING ANY OTHER SPECIAL FF'S
player.ff();
ctx.fillStyle = "black";

ctx.font = "15px Comic Sans MS";
